name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build-${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          make BUILD_VERSION=$VERSION

      - name: Package (tar.gz)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          cd bin
          tar czf "../gitstats_$VERSION_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" .
          cd ..

      - name: Package (zip)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          cd bin
          zip -r "../gitstats_$VERSION_${{ matrix.os }}_${{ matrix.arch }}.zip" .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitstats_${{ matrix.os }}_${{ matrix.arch }}
          path: |
            gitstats_*.tar.gz
            gitstats_*.zip
